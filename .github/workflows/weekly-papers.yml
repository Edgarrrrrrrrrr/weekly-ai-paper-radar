name: Weekly Paper Radar

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * 1"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Generate weekly report
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
          OPENAI_API_STYLE: ${{ vars.OPENAI_API_STYLE }}
        run: python3 scripts/generate_weekly_report.py --config config/pipeline.json

      - name: Commit reports
        run: |
          if [[ -n "$(git status --porcelain reports)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add reports
            git commit -m "chore: weekly paper digest"
            git push
          else
            echo "No report changes to commit."
          fi
